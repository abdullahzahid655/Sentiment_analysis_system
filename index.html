<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMDB Sentiment Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 50px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .emoji {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-section label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .analyze-btn:active {
            transform: translateY(0);
        }

        .clear-btn {
            background: #f0f0f0;
            color: #333;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 1.1em;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-section {
            display: none;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .result-section.show {
            display: block;
        }

        .result-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .sentiment-box {
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .sentiment-positive {
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
            color: white;
        }

        .sentiment-negative {
            background: linear-gradient(135deg, #ef5350 0%, #e53935 100%);
            color: white;
        }

        .sentiment-label {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .confidence-fill {
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .confidence-text {
            font-size: 0.95em;
            margin-top: 10px;
            opacity: 0.9;
        }

        .probability-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .probability-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }

        .probability-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .probability-value {
            font-size: 1.5em;
            font-weight: 600;
        }

        .examples {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .examples h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .example-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .example-btn {
            padding: 10px 15px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .error {
            display: none;
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .error.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .probability-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="emoji">🎬</div>
            <h1>Sentiment Analyzer</h1>
            <p>Analyze movie reviews instantly</p>
        </div>

        <div class="input-section">
            <label for="reviewInput">Enter a movie review:</label>
            <textarea id="reviewInput" placeholder="What do you think about the movie?"></textarea>
        </div>

        <div class="button-group">
            <button class="analyze-btn" onclick="analyzeReview()">Analyze</button>
            <button class="clear-btn" onclick="clearInput()">Clear</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing sentiment...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result-section" id="resultSection">
            <div class="result-title">Analysis Result</div>
            <div class="sentiment-box" id="sentimentBox">
                <div class="sentiment-label" id="sentimentLabel">POSITIVE</div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill" style="width: 0%;"></div>
                </div>
                <div class="confidence-text">
                    Confidence: <span id="confidenceValue">0</span>%
                </div>
                <div class="probability-grid">
                    <div class="probability-item">
                        <div class="probability-label">Positive</div>
                        <div class="probability-value" id="posProb">0%</div>
                    </div>
                    <div class="probability-item">
                        <div class="probability-label">Negative</div>
                        <div class="probability-value" id="negProb">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="examples">
            <h3>Try these examples:</h3>
            <div class="example-buttons">
                <button class="example-btn" onclick="useExample('This movie is absolutely amazing! Best film I have ever seen!')">Positive Review</button>
                <button class="example-btn" onclick="useExample('Terrible film, complete waste of time. Terrible acting and boring plot.')">Negative Review</button>
                <button class="example-btn" onclick="useExample('It was decent. Some good moments but overall pretty average.')">Mixed Review</button>
            </div>
        </div>

        <div class="footer">
            <p>Powered by FastAPI & Machine Learning 🤖</p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        async function analyzeReview() {
            const text = document.getElementById('reviewInput').value.trim();

            if (!text) {
                showError('Please enter a movie review');
                return;
            }

            if (text.length < 5) {
                showError('Review must be at least 5 characters long');
                return;
            }

            hideError();
            showLoading();

            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) {
                    if (response.status === 503) {
                        throw new Error('API is starting up. Please wait a moment and try again.');
                    }
                    throw new Error('Failed to analyze review');
                }

                const data = await response.json();
                displayResult(data);
            } catch (error) {
                showError(error.message || 'Error analyzing review. Make sure the API is running.');
            } finally {
                hideLoading();
            }
        }

        function displayResult(data) {
            const sentiment = data.sentiment.toUpperCase();
            const confidence = Math.round(data.confidence * 100);
            const posProb = Math.round(data.positive_prob * 100);
            const negProb = Math.round(data.negative_prob * 100);

            document.getElementById('sentimentLabel').textContent = sentiment;
            document.getElementById('confidenceValue').textContent = confidence;
            document.getElementById('confidenceFill').style.width = confidence + '%';
            document.getElementById('posProb').textContent = posProb + '%';
            document.getElementById('negProb').textContent = negProb + '%';

            const sentimentBox = document.getElementById('sentimentBox');
            if (sentiment === 'POSITIVE') {
                sentimentBox.className = 'sentiment-box sentiment-positive';
            } else {
                sentimentBox.className = 'sentiment-box sentiment-negative';
            }

            document.getElementById('resultSection').classList.add('show');
        }

        function useExample(text) {
            document.getElementById('reviewInput').value = text;
            analyzeReview();
        }

        function clearInput() {
            document.getElementById('reviewInput').value = '';
            document.getElementById('resultSection').classList.remove('show');
            hideError();
            document.getElementById('reviewInput').focus();
        }

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '⚠️ ' + message;
            errorDiv.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        // Focus on input when page loads
        window.addEventListener('load', () => {
            document.getElementById('reviewInput').focus();
        });

        // Allow Enter key to analyze
        document.getElementById('reviewInput').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                analyzeReview();
            }
        });
    </script>
</body>
</html>
